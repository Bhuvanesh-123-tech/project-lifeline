<!DOCTYPE html>
<html>

<head>
    <title>RESCUE BOT</title>

    <style>
        body {
            background-color: #202020;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        h1 {
            color: #00ff88;
        }

        button {
            width: 80px;
            height: 80px;
            font-size: 30px;
            margin: 5px;
            cursor: pointer;
        }

        .info {
            font-size: 20px;
            margin: 10px;
        }

        .camera {
            width: 500px;
            height: 300px;
            border: 3px solid white;
            margin: auto;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <h1>🚑 RESCUE BOT</h1>

    <div class="camera">
        📹 CAMERA FEED (not active yet)
    </div>

    <div class="info">🌡 Temperature: --</div>
    <div class="info">🌬 Air Quality: --</div>
    <div class="info">⚠ Gas Status: --</div>

    <br>

    <button onclick="sendCmd('forward')">↑</button>

    <br>

    <button onclick="sendCmd('left')">←</button>
    <button onclick="sendCmd('open')">📦</button>
    <button onclick="sendCmd('right')">→</button>

    <br>

    <button onclick="sendCmd('backward')">↓</button>

    <script>
        const ESP = "http://ESP_IP";

        function sendCmd(cmd) {
            fetch(`${ESP}/${cmd}`)
                .then(res => res.text())
                .then(data => console.log(data))
                .catch(err => console.log("ESP32 not reachable"));
        }
    </script>

</body>

</html>
