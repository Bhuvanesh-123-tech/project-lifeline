<!DOCTYPE html>
<html>

<head>
    <title>RESCUE BOT</title>

    <style>
        body {
            background-color: #202020;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        h1 {
            color: #00ff88;
        }

        button {
            width: 80px;
            height: 80px;
            font-size: 30px;
            margin: 5px;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            z-index: 999;
        }
    </style>
</head>

<body>

<div id="overlay">🔴 Checking ESP32 connection...</div>

<h1>🚑 RESCUE BOT</h1>

<button onclick="sendCmd('forward')">↑</button><br>

<button onclick="sendCmd('left')">←</button>
<button onclick="sendCmd('open')">📦</button>
<button onclick="sendCmd('right')">→</button><br>

<button onclick="sendCmd('backward')">↓</button>

<script>
    const ESP = "http://192.168.1.25"; // change this

    let locked = true;

    async function checkESP() {
        try {
            let res = await fetch(`${ESP}/status`);
            let text = await res.text();

            if (text.includes("ONLINE")) {
                locked = false;
                document.getElementById("overlay").style.display = "none";
                enableButtons();
            }
        } catch {
            locked = true;
            document.getElementById("overlay").style.display = "flex";
            disableButtons();
        }
    }

    function sendCmd(cmd) {
        if (locked) return;

        fetch(`${ESP}/${cmd}`)
            .then(res => res.text())
            .then(data => console.log(data));
    }

    function disableButtons() {
        document.querySelectorAll("button").forEach(b => b.disabled = true);
    }

    function enableButtons() {
        document.querySelectorAll("button").forEach(b => b.disabled = false);
    }

    setInterval(checkESP, 3000);
    checkESP();
</script>

</body>
</html>
