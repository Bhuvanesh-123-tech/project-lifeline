<!DOCTYPE html>
<html>

<head>
    <title>RESCUE BOT</title>

    <style>
        body {
            background-color: #202020;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        h1 {
            color: #00ff88;
        }

        button {
            width: 80px;
            height: 80px;
            font-size: 30px;
            margin: 5px;
            cursor: pointer;
        }

        .camera {
            width: 500px;
            height: 300px;
            border: 3px solid white;
            margin: auto;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <h1>🚑 RESCUE BOT</h1>

    <div class="camera">
        📹 CAMERA FEED (offline)
    </div>

    <div id="status">🔴 Checking ESP32...</div>

    <br>

    <button onclick="sendCmd('forward')">↑</button>

    <br>

    <button onclick="sendCmd('left')">←</button>
    <button onclick="sendCmd('open')">📦</button>
    <button onclick="sendCmd('right')">→</button>

    <br>

    <button onclick="sendCmd('backward')">↓</button>

    <script>
        const ESP = "http://192.168.1.25"; // 🔧 CHANGE THIS TO YOUR ESP IP

        let espOnline = false;

        async function checkESP() {
            try {
                let res = await fetch(`${ESP}/status`);
                let text = await res.text();

                if (text.includes("ONLINE")) {
                    espOnline = true;
                    document.getElementById("status").innerText = "🟢 ESP32 CONNECTED";
                    enableButtons();
                }
            } catch {
                espOnline = false;
                document.getElementById("status").innerText = "🔴 ESP32 OFFLINE";
                disableButtons();
            }
        }

        function sendCmd(cmd) {
            if (!espOnline) {
                alert("ESP32 not connected!");
                return;
            }

            fetch(`${ESP}/${cmd}`)
                .then(res => res.text())
                .then(data => console.log("ESP:", data))
                .catch(err => console.log(err));
        }

        function disableButtons() {
            document.querySelectorAll("button").forEach(b => {
                b.disabled = true;
                b.style.opacity = 0.4;
            });
        }

        function enableButtons() {
            document.querySelectorAll("button").forEach(b => {
                b.disabled = false;
                b.style.opacity = 1;
            });
        }

        setInterval(checkESP, 3000);
        checkESP();
    </script>

</body>

</html>
